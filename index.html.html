<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Tarot — 타로 상담</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #05050e;
  --bg2:     #09091a;
  --panel:   #0c0c22;
  --card-bg: #0f0f28;
  --border:  #1a1a40;
  --border2: #2a2a60;
  --gold:    #c9a84c;
  --gold2:   #e8c870;
  --gold3:   #6a5520;
  --teal:    #4ecdc4;
  --rose:    #c94c7a;
  --text:    #e4ddf8;
  --text2:   #8880b8;
  --text3:   #30305a;
  --cw: 88px; --ch: 150px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;cursor:default}

/* ─── STARS ─────────────────── */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ─── UTIL ───────────────────── */
.hidden{display:none!important}
.btn{border:1px solid var(--border2);background:transparent;color:var(--gold);
  font-family:'Noto Sans KR',sans-serif;font-size:13px;letter-spacing:2px;
  padding:11px 22px;border-radius:6px;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold3);color:var(--gold2)}
.btn-ghost{border-color:var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{border-color:#401020;color:#c04060}
.btn-danger:hover{background:rgba(200,64,96,.08);border-color:#c04060}

/* ─── SETUP SCREEN ───────────── */
#screenSetup{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  background:radial-gradient(ellipse at 50% 40%,rgba(100,80,160,.15) 0%,transparent 65%);
}
.setup-logo{
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:8px;
  color:var(--gold2);margin-bottom:8px;opacity:.7;
}
.setup-title{
  font-family:'Cinzel',serif;font-size:clamp(28px,5vw,48px);font-weight:700;
  background:linear-gradient(160deg,var(--gold2),var(--gold),#a07838);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;letter-spacing:4px;margin-bottom:6px;
}
.setup-divider{
  width:120px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold3),transparent);
  margin:18px auto 28px;
}
.setup-desc{font-size:13px;color:var(--text2);letter-spacing:1px;text-align:center;margin-bottom:40px;line-height:1.8}
.setup-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn-primary{
  background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(100,80,30,.12));
  border-color:var(--gold3);color:var(--gold2);font-size:14px;padding:14px 32px;
  letter-spacing:3px;
}
.btn-primary:hover{background:linear-gradient(135deg,rgba(201,168,76,.28),rgba(100,80,30,.2))}

/* ─── WAITING SCREEN ─────────── */
#screenWaiting{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  background:var(--bg);
}
.wait-box{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:16px;padding:36px 40px;text-align:center;max-width:440px;width:90%;
}
.wait-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:3px;margin-bottom:8px}
.wait-desc{font-size:12px;color:var(--text2);letter-spacing:1px;margin-bottom:24px}
.link-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:13px 16px;font-size:12px;color:var(--text2);word-break:break-all;
  margin-bottom:14px;text-align:left;
}
.copy-btn{width:100%;margin-bottom:14px}
.pulse-dot{
  width:10px;height:10px;border-radius:50%;background:var(--gold3);
  animation:pulse 2s ease-in-out infinite;display:inline-block;margin-right:8px;
}
.pulse-dot.connected{background:#48c270;box-shadow:0 0 8px #48c270}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.wait-status{font-size:13px;color:var(--text2)}

/* ─── APP SCREEN ─────────────── */
#screenApp{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
}

/* ─── HEADER ─────────────────── */
header{
  height:50px;min-height:50px;
  background:rgba(5,5,14,.9);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;backdrop-filter:blur(12px);z-index:20;flex-shrink:0;
}
.hdr-logo{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:3px}
.hdr-status{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2)}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:#48c270;box-shadow:0 0 6px #48c270}
.hdr-dot.off{background:var(--text3);box-shadow:none}
.hdr-actions{display:flex;gap:8px}
.hdr-btn{
  background:transparent;border:1px solid var(--border);border-radius:5px;
  padding:5px 12px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;
  font-size:11px;cursor:pointer;transition:all .15s;letter-spacing:1px;
}
.hdr-btn:hover{border-color:var(--border2);color:var(--text)}

/* ─── MAIN LAYOUT ────────────── */
.app-body{
  flex:1;display:flex;overflow:hidden;min-height:0;
}
.main-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:20px;display:flex;flex-direction:column;gap:16px;
}
.chat-sidebar{
  width:300px;min-width:300px;
  background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
}

/* ─── DRAWN CARDS AREA ───────── */
.drawn-label{
  font-size:9px;color:var(--text3);letter-spacing:4px;
  border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:14px;
}
.drawn-cards{
  display:flex;flex-wrap:wrap;gap:12px;min-height:180px;
  align-items:flex-start;align-content:flex-start;
}
.drawn-empty{
  font-size:13px;color:var(--text3);
  display:flex;align-items:center;justify-content:center;
  width:100%;height:160px;letter-spacing:2px;
}

/* ─── DECK AREA (CLIENT) ─────── */
.deck-section{
  display:flex;flex-direction:column;align-items:center;gap:20px;
  padding:24px 0;
}
.deck-label{
  font-family:'Cinzel',serif;font-size:11px;color:var(--text2);
  letter-spacing:4px;text-align:center;
}
.deck-stack{
  position:relative;
  width:var(--cw);height:var(--ch);
  cursor:pointer;
  filter:drop-shadow(0 8px 24px rgba(100,80,160,.4));
}
.deck-stack:hover .deck-card-0{
  transform:translateY(-6px) scale(1.03);
  filter:drop-shadow(0 0 16px rgba(201,168,76,.5));
}
/* stacked shadow cards */
.deck-shadow{
  position:absolute;width:var(--cw);height:var(--ch);
  border-radius:8px;background:var(--card-bg);
  border:1px solid var(--border2);
  transition:transform .3s ease;
}
.deck-shadow:nth-child(1){transform:translateX(-3px) translateY(3px) rotate(-1.5deg)}
.deck-shadow:nth-child(2){transform:translateX(3px) translateY(2px) rotate(1deg)}
.deck-card-0{
  position:absolute;inset:0;border-radius:8px;overflow:hidden;
  transition:all .3s ease;
  background:var(--card-bg);
  border:1px solid var(--border2);
}

/* ─── CARD BACK ──────────────── */
.card-back-face{
  width:100%;height:100%;
  background:linear-gradient(160deg,#0c0c2a 0%,#08082a 100%);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.card-back-face::before{
  content:'';position:absolute;inset:5px;
  border:1px solid var(--gold3);border-radius:5px;
}
.card-back-face::after{
  content:'';position:absolute;inset:8px;
  border:1px solid rgba(201,168,76,.2);border-radius:4px;
}
.card-back-star{
  position:relative;z-index:1;
  font-size:22px;opacity:.6;color:var(--gold);
  text-shadow:0 0 12px rgba(201,168,76,.5);
}

/* ─── SHUFFLE BTN ────────────── */
.shuffle-btn{
  background:transparent;border:1px solid var(--border2);
  border-radius:8px;padding:12px 32px;
  color:var(--text2);font-family:'Noto Sans KR',sans-serif;
  font-size:12px;letter-spacing:3px;cursor:pointer;
  transition:all .3s;position:relative;overflow:hidden;
}
.shuffle-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.06),transparent);
  transform:translateX(-100%);transition:transform .6s;
}
.shuffle-btn:hover{border-color:var(--gold3);color:var(--gold)}
.shuffle-btn:hover::before{transform:translateX(100%)}
.shuffle-btn:disabled{opacity:.4;cursor:not-allowed}

/* ─── SHUFFLE ANIMATION ──────── */
@keyframes shuffleOut0{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(-90px,-40px) rotate(-20deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes shuffleOut1{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(80px,-60px) rotate(15deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes shuffleOut2{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(-60px,50px) rotate(-25deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes shuffleOut3{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(70px,40px) rotate(18deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes shuffleOut4{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(-30px,-70px) rotate(-12deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes shuffleOut5{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(50px,-50px) rotate(22deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes shuffleOut6{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(10px,80px) rotate(-18deg)}100%{transform:translate(0,0) rotate(0)}}

.shuffling .deck-shadow:nth-child(1){animation:shuffleOut0 .9s ease-in-out}
.shuffling .deck-shadow:nth-child(2){animation:shuffleOut1 .9s ease-in-out .05s}
.shuffling .deck-card-0{animation:shuffleOut2 .9s ease-in-out .1s}

/* extra floating cards during shuffle */
.shuffle-card{
  position:fixed;border-radius:8px;overflow:hidden;
  width:var(--cw);height:var(--ch);pointer-events:none;z-index:200;
  background:var(--card-bg);border:1px solid var(--border2);
}

/* ─── CARD FLIP ──────────────── */
.card-wrap{
  position:relative;
  width:var(--cw);height:var(--ch);
  perspective:800px;flex-shrink:0;
}
.card-inner{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.4,0,.2,1);
}
.card-inner.flipped{transform:rotateY(180deg)}
.card-inner.reversed .card-face{transform:rotateY(180deg) rotate(180deg)}
.card-face,.card-back-card{
  position:absolute;inset:0;border-radius:8px;overflow:hidden;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border:1px solid var(--border2);
}
.card-face{transform:rotateY(180deg)}
.card-face img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.card-face-fallback{
  width:100%;height:100%;
  background:linear-gradient(160deg,#14142e,#0a0a20);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  padding:8px;
}
.card-face-fallback .cn{
  font-family:'Cormorant Garamond',serif;font-size:11px;
  color:var(--gold);text-align:center;line-height:1.4;
}
.card-face-fallback .ck{
  font-size:9px;color:var(--text2);text-align:center;
}
.card-face-fallback .cs{font-size:20px;opacity:.5}
.card-rev-badge{
  position:absolute;bottom:4px;right:4px;z-index:2;
  background:rgba(200,64,100,.8);border-radius:3px;
  padding:2px 5px;font-size:8px;color:#fff;letter-spacing:1px;
}
.card-back-card .card-back-face{border-radius:7px}

/* drawn card label */
.drawn-card-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.drawn-card-name{
  font-family:'Cormorant Garamond',serif;font-size:10px;
  color:var(--text2);text-align:center;max-width:var(--cw);
  line-height:1.3;
}

/* ─── CHAT SIDEBAR ───────────── */
.chat-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  font-size:9px;letter-spacing:4px;color:var(--text3);
}
.chat-msgs{
  flex:1;overflow-y:auto;padding:12px;
  display:flex;flex-direction:column;gap:8px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.msg{
  padding:9px 12px;border-radius:8px;max-width:85%;
  font-size:12px;line-height:1.6;word-break:break-word;
}
.msg-consultant{
  background:rgba(201,168,76,.1);border:1px solid var(--gold3);
  align-self:flex-end;color:var(--text);
}
.msg-client{
  background:rgba(78,205,196,.07);border:1px solid rgba(78,205,196,.2);
  align-self:flex-start;color:var(--text);
}
.msg-sys{
  background:transparent;font-size:10px;color:var(--text3);
  text-align:center;align-self:center;letter-spacing:1px;
  border:none!important;
}
.msg-name{font-size:9px;letter-spacing:2px;margin-bottom:3px;opacity:.7}
.chat-input-wrap{
  padding:12px;border-top:1px solid var(--border);
  display:flex;gap:8px;
}
.chat-input{
  flex:1;background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;padding:9px 12px;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:13px;resize:none;height:40px;transition:border-color .2s;
}
.chat-input:focus{outline:none;border-color:var(--border2)}
.send-btn{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:6px;padding:8px 14px;
  color:var(--gold);cursor:pointer;transition:all .15s;font-size:16px;
}
.send-btn:hover{background:rgba(201,168,76,.1)}

/* ─── NOTIFICATION ───────────── */
.notif{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--border2);
  border-radius:8px;padding:11px 20px;
  font-size:12px;color:var(--text);letter-spacing:1px;
  z-index:500;animation:notifIn .3s ease;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
}
@keyframes notifIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ─── CARD REVEAL (full-size popup) ─── */
.card-reveal-overlay{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.85);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.card-reveal-box{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  animation:revealUp .4s ease;
}
@keyframes revealUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.card-reveal-img{
  width:160px;height:273px;border-radius:12px;overflow:hidden;
  border:1px solid var(--border2);
  box-shadow:0 0 40px rgba(201,168,76,.3);
}
.card-reveal-img img{width:100%;height:100%;object-fit:cover;display:block}
.card-reveal-img.rev img{transform:rotate(180deg)}
.card-reveal-name{
  font-family:'Cinzel',serif;font-size:18px;color:var(--gold2);
  letter-spacing:2px;text-align:center;
}
.card-reveal-sub{font-size:12px;color:var(--text2);letter-spacing:1px}
.card-reveal-close{font-size:12px;color:var(--text3);cursor:pointer;letter-spacing:2px;margin-top:4px}
.card-reveal-close:hover{color:var(--text2)}

/* ─── SCROLLBAR ──────────────── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ─── RESPONSIVE ─────────────── */
@media(max-width:660px){
  .chat-sidebar{display:none}
  .app-body{flex-direction:column}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- ══════ SETUP SCREEN ══════ -->
<div id="screenSetup">
  <div class="setup-logo">M Y S T I C</div>
  <div class="setup-title">TAROT</div>
  <div class="setup-divider"></div>
  <p class="setup-desc">실시간 타로 상담 플랫폼<br>상담사와 내담자가 함께하는 공간</p>
  <div class="setup-btns">
    <button class="btn btn-primary" id="btnConsultant">✦ 상담사로 시작</button>
    <button class="btn btn-ghost" id="btnClient" style="display:none">⟡ 내담자로 접속</button>
  </div>
  <p id="setupJoining" style="color:var(--text2);font-size:12px;letter-spacing:2px;margin-top:20px;display:none">세션에 접속하는 중...</p>
</div>

<!-- ══════ WAITING SCREEN ══════ -->
<div id="screenWaiting" class="hidden">
  <div class="wait-box">
    <div class="wait-title">✦ 세션 생성 완료</div>
    <div class="wait-desc">아래 링크를 내담자에게 공유해주세요</div>
    <div class="link-box" id="waitLink">...</div>
    <button class="btn copy-btn" id="copyLinkBtn">링크 복사</button>
    <div class="wait-status">
      <span class="pulse-dot" id="waitDot"></span>
      <span id="waitStatusText">내담자 연결 대기 중...</span>
    </div>
  </div>
</div>

<!-- ══════ APP SCREEN ══════ -->
<div id="screenApp" class="hidden">

  <header>
    <div class="hdr-logo">✦ MYSTIC TAROT</div>
    <div class="hdr-status">
      <div class="hdr-dot" id="hdrDot"></div>
      <span id="hdrStatusText">연결 중...</span>
    </div>
    <div class="hdr-actions">
      <button class="hdr-btn" id="btnSaveSession">상담 저장</button>
      <button class="hdr-btn" id="btnEndSession" style="color:#c04060;border-color:#401020">종료</button>
    </div>
  </header>

  <div class="app-body">

    <!-- ── MAIN ── -->
    <div class="main-area" id="mainArea">

      <!-- CONSULTANT VIEW -->
      <div id="viewConsultant" class="hidden">
        <div class="drawn-label">DRAWN CARDS · 실시간</div>
        <div class="drawn-cards" id="cDrawnCards">
          <div class="drawn-empty" id="cDrawnEmpty">카드가 뽑히면 여기에 나타납니다</div>
        </div>
      </div>

      <!-- CLIENT VIEW -->
      <div id="viewClient" class="hidden">
        <div class="deck-section">
          <div class="deck-label">카드를 집중하며 덱을 셔플하세요</div>
          <div class="deck-stack" id="deckStack">
            <div class="deck-shadow"></div>
            <div class="deck-shadow"></div>
            <div class="deck-card-0">
              <div class="card-back-face"><div class="card-back-star">✦</div></div>
            </div>
          </div>
          <button class="shuffle-btn" id="shuffleBtn">◈ 셔플</button>
          <button class="btn" id="drawBtn" style="font-size:12px;letter-spacing:2px">카드 뽑기</button>
        </div>
        <div class="drawn-label">뽑은 카드</div>
        <div class="drawn-cards" id="pDrawnCards">
          <div class="drawn-empty" id="pDrawnEmpty">카드를 아직 뽑지 않았어요</div>
        </div>
      </div>

    </div><!-- /main-area -->

    <!-- ── CHAT ── -->
    <div class="chat-sidebar">
      <div class="chat-header">CHAT · 채팅</div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="메시지 입력..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>

  </div><!-- /app-body -->
</div><!-- /screenApp -->

function cardImg(card) { return IMG_BASE + card.id + '.jpg'; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ═══════════════════════════════════════════════
   STAR CANVAS
═══════════════════════════════════════════════ */
(function(){
  const canvas=document.getElementById('stars');
  const ctx=canvas.getContext('2d');
  let stars=[];
  function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; makeStars(); }
  function makeStars(){
    stars=[];
    const n=Math.floor(canvas.width*canvas.height/8000);
    for(let i=0;i<n;i++) stars.push({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height,
      r:Math.random()*1.2+.2, o:Math.random()*.8+.1,
      s:Math.random()*2+1
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      const t=Date.now()/1000;
      const pulse=.5+.5*Math.sin(t/s.s+s.x);
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,190,255,${s.o*pulse})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize(); draw();
})();

/* ═══════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════ */
let db, role='', roomId='', localDeck=[], drawnIds=new Set();
let isConnected=false;

function show(id){ document.getElementById(id).classList.remove('hidden') }
function hide(id){ document.getElementById(id).classList.add('hidden') }
function notify(msg, dur=2800){
  const el=document.createElement('div');
  el.className='notif'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), dur);
}

/* ═══════════════════════════════════════════════
   INIT FIREBASE
═══════════════════════════════════════════════ */
function initDB(){
  try{
    firebase.initializeApp(firebaseConfig);
    db=firebase.database();
    return true;
  }catch(e){
    alert('Firebase 설정 오류: firebaseConfig를 확인해주세요.\n'+e.message);
    return false;
  }
}

/* ═══════════════════════════════════════════════
   SETUP ROUTING
═══════════════════════════════════════════════ */
function init(){
  localDeck=shuffle([...DECK]);

  const params=new URLSearchParams(location.search);
  const rm=params.get('room');

  if(rm){
    // Client path — init Firebase first then enter
    document.getElementById('setupJoining').style.display='block';
    if(!initDB()) return;
    role='client';
    roomId=rm;
    setTimeout(()=>enterSession(), 600);
  } else {
    // Consultant path — show button immediately, init Firebase on click
    document.getElementById('btnConsultant').onclick=()=>{
      if(!initDB()) return;
      createRoom();
    };
  }
}

/* ═══════════════════════════════════════════════
   CONSULTANT: CREATE ROOM
═══════════════════════════════════════════════ */
function createRoom(){
  role='consultant';
  roomId=Math.random().toString(36).slice(2,8).toUpperCase();
  const url=location.origin+location.pathname+'?room='+roomId;

  hide('screenSetup');
  show('screenWaiting');
  document.getElementById('waitLink').textContent=url;

  document.getElementById('copyLinkBtn').onclick=()=>{
    navigator.clipboard.writeText(url).then(()=>notify('링크가 복사됐어요 ✦'));
  };

  db.ref('rooms/'+roomId).set({
    created: Date.now(),
    status:'waiting'
  });

  db.ref('rooms/'+roomId+'/status').on('value', snap=>{
    if(snap.val()==='active'){
      hide('screenWaiting');
      enterSession();
    }
  });
}

/* ═══════════════════════════════════════════════
   ENTER SESSION
═══════════════════════════════════════════════ */
function enterSession(){
  if(role==='client'){
    db.ref('rooms/'+roomId+'/status').set('active');
  }

  hide('screenSetup');
  hide('screenWaiting');
  show('screenApp');

  if(role==='consultant'){
    show('viewConsultant');
    document.getElementById('hdrStatusText').textContent='상담사 · Room '+roomId;
  } else {
    show('viewClient');
    document.getElementById('hdrStatusText').textContent='내담자 · Room '+roomId;
  }

  document.getElementById('hdrDot').classList.remove('off');
  isConnected=true;

  listenCards();
  listenChat();
  setupControls();
}

/* ═══════════════════════════════════════════════
   CARD DRAW & SYNC
═══════════════════════════════════════════════ */
function drawCard(){
  const available=localDeck.filter(c=>!drawnIds.has(c.id));
  if(available.length===0){ notify('모든 카드를 뽑았어요. 셔플 후 다시 시작하세요.'); return; }
  const card=available[0];
  const reversed=Math.random()<0.33;
  drawnIds.add(card.id);

  const key='card_'+Date.now();
  db.ref('rooms/'+roomId+'/cards/'+key).set({
    id:card.id, reversed, ts:Date.now()
  });

  // sys message
  const revStr=reversed?' (역방향)':'';
  sendSysMsg('✦ '+card.kr+revStr+' 카드가 뽑혔습니다');
}

function listenCards(){
  const area=role==='consultant'
    ? document.getElementById('cDrawnCards')
    : document.getElementById('pDrawnCards');
  const empty=role==='consultant'
    ? document.getElementById('cDrawnEmpty')
    : document.getElementById('pDrawnEmpty');

  db.ref('rooms/'+roomId+'/cards').on('value', snap=>{
    const data=snap.val()||{};
    const keys=Object.keys(data).sort((a,b)=>data[a].ts-data[b].ts);
    if(keys.length===0){ empty.style.display='flex'; return; }
    empty.style.display='none';
    area.innerHTML='';
    keys.forEach(k=>{
      const entry=data[k];
      const card=DECK.find(c=>c.id===entry.id);
      if(!card) return;
      area.appendChild(makeCardEl(card, entry.reversed));
    });
    // Flip with delay
    const wraps=area.querySelectorAll('.card-inner');
    wraps.forEach((w,i)=>{
      if(!w.dataset.flipped){
        w.dataset.flipped='1';
        setTimeout(()=>w.classList.add('flipped'), 50+i*60);
      }
    });
  });
}

function makeCardEl(card, reversed){
  const wrap=document.createElement('div');
  wrap.className='drawn-card-wrap';

  const cw=document.createElement('div');
  cw.className='card-wrap';
  cw.onclick=()=>revealCard(card,reversed);

  const inner=document.createElement('div');
  inner.className='card-inner'+(reversed?' reversed':'');

  // Back
  const back=document.createElement('div');
  back.className='card-back-card';
  back.innerHTML='<div class="card-back-face"><div class="card-back-star">✦</div></div>';

  // Front
  const front=document.createElement('div');
  front.className='card-face';
  front.innerHTML=`
    <img src="${cardImg(card)}" alt="${esc(card.name)}"
         onerror="this.style.display='none';this.nextSibling.style.display='flex'">
    <div class="card-face-fallback" style="display:none">
      <div class="cs">${SUIT_ICON[card.suit]||'✦'}</div>
      <div class="cn">${esc(card.name)}</div>
      <div class="ck">${esc(card.kr)}</div>
    </div>
    ${reversed?'<div class="card-rev-badge">역</div>':''}
  `;

  inner.appendChild(back);
  inner.appendChild(front);
  cw.appendChild(inner);
  wrap.appendChild(cw);

  const label=document.createElement('div');
  label.className='drawn-card-name';
  label.textContent=card.kr+(reversed?' ↓':'');
  wrap.appendChild(label);

  return wrap;
}

/* ─── CARD REVEAL POPUP ─── */
function revealCard(card, reversed){
  const overlay=document.createElement('div');
  overlay.className='card-reveal-overlay';
  overlay.onclick=()=>overlay.remove();
  overlay.innerHTML=`
    <div class="card-reveal-box">
      <div class="card-reveal-img ${reversed?'rev':''}">
        <img src="${cardImg(card)}" alt="${esc(card.name)}"
             onerror="this.parentElement.style.background='#14142e';this.style.display='none'">
      </div>
      <div class="card-reveal-name">${esc(card.name)}</div>
      <div class="card-reveal-sub">${esc(card.kr)}${reversed?' · 역방향':''}</div>
      <div class="card-reveal-close">[ 닫기 ]</div>
    </div>
  `;
  document.body.appendChild(overlay);
}

/* ═══════════════════════════════════════════════
   SHUFFLE ANIMATION
═══════════════════════════════════════════════ */
function doShuffle(){
  const btn=document.getElementById('shuffleBtn');
  const drawBtn=document.getElementById('drawBtn');
  btn.disabled=true; drawBtn.disabled=true;

  const stack=document.getElementById('deckStack');
  const rect=stack.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;

  // Create flying cards
  const dirs=[
    [-100,-50,-25],[ 90,-70, 20],[-70, 60,-30],
    [ 80, 45, 18],[-40,-80,-15],[ 60,-55, 28],
    [ 10, 90,-22]
  ];
  const flyCards=dirs.map(([dx,dy,rot])=>{
    const fc=document.createElement('div');
    fc.className='shuffle-card';
    fc.innerHTML='<div class="card-back-face" style="border-radius:7px"><div class="card-back-star">✦</div></div>';
    fc.style.cssText=`left:${cx-44}px;top:${cy-75}px;transition:transform .45s cubic-bezier(.4,0,.2,1),opacity .45s`;
    document.body.appendChild(fc);
    return {el:fc, dx, dy, rot};
  });

  requestAnimationFrame(()=>{
    flyCards.forEach(({el,dx,dy,rot})=>{
      el.style.transform=`translate(${dx}px,${dy}px) rotate(${rot}deg)`;
      el.style.opacity='0.85';
    });
  });

  // Return & remove
  setTimeout(()=>{
    flyCards.forEach(({el})=>{
      el.style.transform='translate(0,0) rotate(0deg)';
      el.style.opacity='0';
    });
    setTimeout(()=>{
      flyCards.forEach(({el})=>el.remove());
      // Reset deck
      localDeck=shuffle([...DECK]);
      drawnIds.clear();
      db.ref('rooms/'+roomId+'/cards').remove();
      btn.disabled=false; drawBtn.disabled=false;
      notify('셔플 완료 ✦ 카드를 뽑아보세요');
    }, 500);
  }, 550);
}

/* ═══════════════════════════════════════════════
   CHAT
═══════════════════════════════════════════════ */
function listenChat(){
  db.ref('rooms/'+roomId+'/chat').on('value', snap=>{
    const data=snap.val()||{};
    const msgs=Object.values(data).sort((a,b)=>a.ts-b.ts);
    const box=document.getElementById('chatMsgs');
    box.innerHTML='';
    msgs.forEach(m=>box.appendChild(makeMsgEl(m)));
    box.scrollTop=box.scrollHeight;
  });
}

function makeMsgEl(m){
  const el=document.createElement('div');
  if(m.sys){
    el.className='msg msg-sys';
    el.textContent=m.text;
  } else {
    el.className='msg msg-'+m.role;
    const name=document.createElement('div');
    name.className='msg-name';
    name.textContent=m.role==='consultant'?'✦ 상담사':'⟡ 내담자';
    el.appendChild(name);
    const txt=document.createElement('div');
    txt.textContent=m.text;
    el.appendChild(txt);
  }
  return el;
}

function sendMsg(){
  const inp=document.getElementById('chatInput');
  const txt=inp.value.trim();
  if(!txt) return;
  db.ref('rooms/'+roomId+'/chat').push({ role, text:txt, ts:Date.now() });
  inp.value='';
}

function sendSysMsg(text){
  db.ref('rooms/'+roomId+'/chat').push({ sys:true, text, ts:Date.now() });
}

/* ═══════════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════════ */
function setupControls(){
  // Chat
  document.getElementById('sendBtn').onclick=sendMsg;
  document.getElementById('chatInput').addEventListener('keydown', e=>{
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
  });

  // Draw / Shuffle (client only)
  if(role==='client'){
    document.getElementById('drawBtn').onclick=drawCard;
    document.getElementById('shuffleBtn').onclick=doShuffle;
  }

  // Save
  document.getElementById('btnSaveSession').onclick=saveSession;

  // End
  document.getElementById('btnEndSession').onclick=()=>{
    if(!confirm('상담을 종료할까요?')) return;
    db.ref('rooms/'+roomId+'/status').set('ended');
    saveSession();
    notify('상담이 종료됐습니다. 내역이 저장됩니다.');
    setTimeout(()=>location.href=location.pathname, 2500);
  };
}

/* ═══════════════════════════════════════════════
   SAVE SESSION
═══════════════════════════════════════════════ */
function saveSession(){
  Promise.all([
    db.ref('rooms/'+roomId+'/cards').once('value'),
    db.ref('rooms/'+roomId+'/chat').once('value')
  ]).then(([cardsSnap, chatSnap])=>{
    const cards=Object.values(cardsSnap.val()||{}).sort((a,b)=>a.ts-b.ts);
    const msgs=Object.values(chatSnap.val()||{}).sort((a,b)=>a.ts-b.ts);
    const date=new Date().toLocaleString('ko-KR');
    let txt=`✦ MYSTIC TAROT 상담 기록\n날짜: ${date}\nRoom: ${roomId}\n\n`;
    txt+=`── 뽑힌 카드 ──\n`;
    cards.forEach((c,i)=>{
      const card=DECK.find(d=>d.id===c.id);
      if(card) txt+=`${i+1}. ${card.name} (${card.kr})${c.reversed?' [역방향]':''}\n`;
    });
    txt+=`\n── 채팅 내역 ──\n`;
    msgs.forEach(m=>{
      if(m.sys) txt+=`[알림] ${m.text}\n`;
      else txt+=`[${m.role==='consultant'?'상담사':'내담자'}] ${m.text}\n`;
    });
    const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`tarot-${roomId}-${Date.now()}.txt`;
    a.click();
    notify('상담 내역이 다운로드됐습니다 ✦');
  });
}

window.addEventListener('DOMContentLoaded', init);
