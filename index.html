<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Tarot — 타로 상담</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#05050e;--bg2:#09091a;--panel:#0c0c22;--card-bg:#0f0f28;
  --border:#1a1a40;--border2:#2a2a60;
  --gold:#c9a84c;--gold2:#e8c870;--gold3:#6a5520;
  --text:#e4ddf8;--text2:#8880b8;--text3:#30305a;
  --cw:88px;--ch:150px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.hidden{display:none!important}
.btn{border:1px solid var(--border2);background:transparent;color:var(--gold);
  font-family:'Noto Sans KR',sans-serif;font-size:13px;letter-spacing:2px;
  padding:11px 22px;border-radius:6px;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold3);color:var(--gold2)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{border-color:var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-primary{background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(100,80,30,.12));
  border-color:var(--gold3);color:var(--gold2);font-size:14px;padding:14px 32px;letter-spacing:3px}
.btn-primary:hover{background:linear-gradient(135deg,rgba(201,168,76,.28),rgba(100,80,30,.2))}

/* SETUP */
#screenSetup{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,rgba(100,80,160,.15) 0%,transparent 65%)}
.setup-logo{font-family:'Cinzel',serif;font-size:13px;letter-spacing:8px;color:var(--gold2);margin-bottom:8px;opacity:.7}
.setup-title{font-family:'Cinzel',serif;font-size:clamp(28px,5vw,48px);font-weight:700;
  background:linear-gradient(160deg,var(--gold2),var(--gold),#a07838);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;letter-spacing:4px;margin-bottom:6px}
.setup-divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);margin:18px auto 28px}
.setup-desc{font-size:13px;color:var(--text2);letter-spacing:1px;text-align:center;margin-bottom:40px;line-height:1.8}
.setup-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}

/* WAITING */
#screenWaiting{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;background:var(--bg)}
.wait-box{background:var(--panel);border:1px solid var(--border2);border-radius:16px;
  padding:36px 40px;text-align:center;max-width:440px;width:90%}
.wait-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:3px;margin-bottom:8px}
.wait-desc{font-size:12px;color:var(--text2);letter-spacing:1px;margin-bottom:24px}
.link-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:13px 16px;font-size:12px;color:var(--text2);word-break:break-all;margin-bottom:14px;text-align:left}
.copy-btn{width:100%;margin-bottom:14px}
.pulse-dot{width:10px;height:10px;border-radius:50%;background:var(--gold3);
  animation:pulse 2s ease-in-out infinite;display:inline-block;margin-right:8px}
.pulse-dot.on{background:#48c270;box-shadow:0 0 8px #48c270}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.wait-status{font-size:13px;color:var(--text2)}

/* APP */
#screenApp{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column}
header{height:50px;min-height:50px;background:rgba(5,5,14,.9);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  backdrop-filter:blur(12px);z-index:20;flex-shrink:0}
.hdr-logo{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:3px}
.hdr-status{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2)}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:#48c270;box-shadow:0 0 6px #48c270}
.hdr-dot.off{background:var(--text3);box-shadow:none}
.hdr-actions{display:flex;gap:8px}
.hdr-btn{background:transparent;border:1px solid var(--border);border-radius:5px;
  padding:5px 12px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;
  font-size:11px;cursor:pointer;transition:all .15s;letter-spacing:1px}
.hdr-btn:hover{border-color:var(--border2);color:var(--text)}
.hdr-btn.blue{border-color:#2a4a6a;color:#6ab4e8}
.hdr-btn.blue:hover{background:rgba(106,180,232,.1)}

/* LAYOUT */
.app-body{flex:1;display:flex;overflow:hidden;min-height:0}
.main-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;display:flex;flex-direction:column;gap:16px}
.chat-sidebar{width:300px;min-width:300px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column}

/* PINNED QUESTION */
.pinned-q{background:rgba(201,168,76,.07);border-bottom:1px solid var(--gold3);padding:12px 16px;flex-shrink:0}
.pinned-q-label{font-size:8px;color:var(--gold3);letter-spacing:3px;margin-bottom:5px}
.pinned-q-text{font-size:13px;color:var(--gold2);line-height:1.5;font-family:'Cormorant Garamond',serif;font-style:italic}
.pinned-q-round{font-size:9px;color:var(--text3);margin-top:4px;letter-spacing:2px}

/* QUESTION INPUT */
.q-section{display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px 20px;max-width:520px;margin:0 auto;width:100%}
.q-title{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:4px;text-align:center}
.q-desc{font-size:12px;color:var(--text2);text-align:center;line-height:1.8;letter-spacing:1px}
.q-textarea{width:100%;background:var(--card-bg);border:1px solid var(--border2);border-radius:10px;
  padding:16px 18px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;
  resize:none;height:100px;transition:border-color .2s;line-height:1.7}
.q-textarea:focus{outline:none;border-color:var(--gold3)}
.q-textarea::placeholder{color:var(--text3)}
.q-btn{width:100%;max-width:260px}

/* DECK */
.deck-section{display:flex;flex-direction:column;align-items:center;gap:20px;padding:24px 0}
.deck-label{font-family:'Cinzel',serif;font-size:11px;color:var(--text2);letter-spacing:4px;text-align:center}
.deck-stack{position:relative;width:var(--cw);height:var(--ch);
  filter:drop-shadow(0 8px 24px rgba(100,80,160,.4))}
.deck-stack.interactive{cursor:pointer}
.deck-stack.interactive:hover .deck-top{transform:translateY(-6px) scale(1.03);
  filter:drop-shadow(0 0 16px rgba(201,168,76,.5))}
.deck-shadow{position:absolute;width:var(--cw);height:var(--ch);border-radius:8px;
  background:var(--card-bg);border:1px solid var(--border2)}
.deck-shadow:nth-child(1){transform:translateX(-3px) translateY(3px) rotate(-1.5deg)}
.deck-shadow:nth-child(2){transform:translateX(3px) translateY(2px) rotate(1deg)}
.deck-top{position:absolute;inset:0;border-radius:8px;overflow:hidden;
  transition:all .3s ease;background:var(--card-bg);border:1px solid var(--border2)}
.deck-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* CARD BACK */
.card-back-face{width:100%;height:100%;background:linear-gradient(160deg,#0c0c2a,#08082a);
  position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-back-face::before{content:'';position:absolute;inset:5px;border:1px solid var(--gold3);border-radius:5px}
.card-back-face::after{content:'';position:absolute;inset:8px;border:1px solid rgba(201,168,76,.2);border-radius:4px}
.card-back-star{position:relative;z-index:1;font-size:22px;opacity:.6;color:var(--gold);text-shadow:0 0 12px rgba(201,168,76,.5)}

/* SHUFFLE BTN */
.shuffle-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;
  padding:12px 32px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;
  font-size:12px;letter-spacing:3px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.shuffle-btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.06),transparent);
  transform:translateX(-100%);transition:transform .6s}
.shuffle-btn:hover{border-color:var(--gold3);color:var(--gold)}
.shuffle-btn:hover::before{transform:translateX(100%)}
.shuffle-btn:disabled{opacity:.4;cursor:not-allowed}
.shuffle-card{position:fixed;border-radius:8px;overflow:hidden;width:var(--cw);height:var(--ch);
  pointer-events:none;z-index:200;background:var(--card-bg);border:1px solid var(--border2)}

/* CARD FLIP */
.card-wrap{position:relative;width:var(--cw);height:var(--ch);perspective:800px;flex-shrink:0}
.card-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,0,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.card-inner.reversed .card-face{transform:rotateY(180deg) rotate(180deg)}
.card-face,.card-back-card{position:absolute;inset:0;border-radius:8px;overflow:hidden;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--border2)}
.card-face{transform:rotateY(180deg)}
.card-face img{width:100%;height:100%;object-fit:cover;display:block}
.card-face-fallback{width:100%;height:100%;background:linear-gradient(160deg,#14142e,#0a0a20);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:8px}
.card-face-fallback .cn{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--gold);text-align:center;line-height:1.4}
.card-face-fallback .ck{font-size:9px;color:var(--text2);text-align:center}
.card-face-fallback .cs{font-size:20px;opacity:.5}
.card-rev-badge{position:absolute;bottom:4px;right:4px;z-index:2;background:rgba(200,64,100,.8);
  border-radius:3px;padding:2px 5px;font-size:8px;color:#fff;letter-spacing:1px}
.card-back-card .card-back-face{border-radius:7px}
.drawn-card-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.drawn-card-name{font-family:'Cormorant Garamond',serif;font-size:10px;color:var(--text2);
  text-align:center;max-width:var(--cw);line-height:1.3}

/* DRAWN AREA */
.section-label{font-size:9px;color:var(--text3);letter-spacing:4px;
  border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:14px}
.drawn-cards{display:flex;flex-wrap:wrap;gap:12px;min-height:80px;align-items:flex-start;align-content:flex-start}
.drawn-empty{font-size:12px;color:var(--text3);display:flex;align-items:center;justify-content:center;
  width:100%;height:100px;letter-spacing:2px}

/* ROUND BLOCK (previous rounds) */
.round-block{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:4px}
.round-block-title{font-size:9px;color:var(--text3);letter-spacing:3px;margin-bottom:8px}
.round-block-q{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;
  color:var(--gold2);margin-bottom:12px;line-height:1.5;padding:8px 12px;
  background:rgba(201,168,76,.05);border-left:2px solid var(--gold3);border-radius:0 4px 4px 0}

/* WAITING NOTICE (consultant waiting for Q) */
.waiting-notice{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:48px 20px;text-align:center}
.waiting-icon{font-size:32px;opacity:.4;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.waiting-text{font-size:13px;color:var(--text2);letter-spacing:1px;line-height:1.8}

/* CHAT */
.chat-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:9px;letter-spacing:4px;color:var(--text3);flex-shrink:0}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.msg{padding:9px 12px;border-radius:8px;max-width:85%;font-size:12px;line-height:1.6;word-break:break-word}
.msg-consultant{background:rgba(201,168,76,.1);border:1px solid var(--gold3);align-self:flex-end;color:var(--text)}
.msg-client{background:rgba(78,205,196,.07);border:1px solid rgba(78,205,196,.2);align-self:flex-start;color:var(--text)}
.msg-sys{background:transparent;font-size:10px;color:var(--text3);text-align:center;align-self:center;letter-spacing:1px;border:none!important}
.msg-name{font-size:9px;letter-spacing:2px;margin-bottom:3px;opacity:.7}
.chat-input-wrap{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.chat-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:9px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:13px;resize:none;height:40px;transition:border-color .2s}
.chat-input:focus{outline:none;border-color:var(--border2)}
.send-btn{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;
  padding:8px 14px;color:var(--gold);cursor:pointer;transition:all .15s;font-size:16px}
.send-btn:hover{background:rgba(201,168,76,.1)}

/* NOTIF */
.notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--border2);border-radius:8px;
  padding:11px 20px;font-size:12px;color:var(--text);letter-spacing:1px;
  z-index:500;animation:notifIn .3s ease;box-shadow:0 8px 30px rgba(0,0,0,.5)}
@keyframes notifIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* CARD REVEAL */
.card-reveal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);
  backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.card-reveal-box{display:flex;flex-direction:column;align-items:center;gap:16px;animation:revealUp .4s ease}
@keyframes revealUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.card-reveal-img{width:160px;height:273px;border-radius:12px;overflow:hidden;
  border:1px solid var(--border2);box-shadow:0 0 40px rgba(201,168,76,.3)}
.card-reveal-img img{width:100%;height:100%;object-fit:cover;display:block}
.card-reveal-img.rev img{transform:rotate(180deg)}
.card-reveal-name{font-family:'Cinzel',serif;font-size:18px;color:var(--gold2);letter-spacing:2px;text-align:center}
.card-reveal-sub{font-size:12px;color:var(--text2);letter-spacing:1px}
.card-reveal-close{font-size:12px;color:var(--text3);cursor:pointer;letter-spacing:2px;margin-top:4px}
.card-reveal-close:hover{color:var(--text2)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@media(max-width:660px){.chat-sidebar{display:none}}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<!-- SETUP -->
<div id="screenSetup">
  <div class="setup-logo">M Y S T I C</div>
  <div class="setup-title">TAROT</div>
  <div class="setup-divider" style="width:120px;height:1px;background:linear-gradient(90deg,transparent,#6a5520,transparent);margin:18px auto 28px"></div>
  <p class="setup-desc">실시간 타로 상담 플랫폼<br>상담사와 내담자가 함께하는 공간</p>
  <div class="setup-btns">
    <button class="btn btn-primary" id="btnConsultant">✦ 상담사로 시작</button>
  </div>
  <p id="setupJoining" style="color:var(--text2);font-size:12px;letter-spacing:2px;margin-top:20px;display:none">세션에 접속하는 중...</p>
</div>

<!-- WAITING -->
<div id="screenWaiting" class="hidden">
  <div class="wait-box">
    <div class="wait-title">✦ 세션 생성 완료</div>
    <div class="wait-desc">아래 링크를 내담자에게 공유해주세요</div>
    <div class="link-box" id="waitLink">...</div>
    <button class="btn copy-btn" id="copyLinkBtn">링크 복사</button>
    <div class="wait-status">
      <span class="pulse-dot" id="waitDot"></span>
      <span id="waitStatusText">내담자 연결 대기 중...</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="screenApp" class="hidden">
  <header>
    <div class="hdr-logo">✦ MYSTIC TAROT</div>
    <div class="hdr-status">
      <div class="hdr-dot off" id="hdrDot"></div>
      <span id="hdrStatusText">연결 중...</span>
    </div>
    <div class="hdr-actions">
      <button class="hdr-btn blue hidden" id="btnAddQ">+ 추가 질문</button>
      <button class="hdr-btn" id="btnSave">상담 저장</button>
      <button class="hdr-btn" id="btnEnd" style="color:#c04060;border-color:#401020">종료</button>
    </div>
  </header>
  <div class="app-body">
    <div class="main-area" id="mainArea"></div>
    <div class="chat-sidebar">
      <div class="chat-header">CHAT · 채팅</div>
      <div class="pinned-q hidden" id="pinnedQ">
        <div class="pinned-q-label">CURRENT QUESTION</div>
        <div class="pinned-q-text" id="pinnedQText"></div>
        <div class="pinned-q-round" id="pinnedQRound"></div>
      </div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="메시지 입력..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>
</div>

(function(){

  const rs=()=>{cv.width=innerWidth;cv.height=innerHeight;s=[];
    for(let i=0;i<Math.floor(cv.width*cv.height/8000);i++)
      s.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.2+.2,o:Math.random()*.8+.1,sp:Math.random()*2+1});};
  const dr=()=>{ctx.clearRect(0,0,cv.width,cv.height);

/* STATE */
let db,role='',roomId='',localDeck=[],drawnIds=new Set(),currentRound=0,prevShuffleTs=0;
const $=id=>document.getElementById(id);
const show=id=>$(id).classList.remove('hidden');
const hide=id=>$(id).classList.add('hidden');
function notify(msg,dur=2800){
  const el=document.createElement('div');el.className='notif';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),dur);}

/* INIT */
function initDB(){
  try{firebase.initializeApp(firebaseConfig);db=firebase.database();return true;}
  catch(e){alert('Firebase 오류: '+e.message);return false;}
}
function init(){
  localDeck=rnd([...DECK]);
  const rm=new URLSearchParams(location.search).get('room');
  if(rm){
    $('setupJoining').style.display='block';
    if(!initDB())return;
    role='client';roomId=rm;setTimeout(enterSession,600);
  } else {
    $('btnConsultant').onclick=()=>{if(!initDB())return;createRoom();};
  }
}

/* CREATE ROOM */
function createRoom(){
  role='consultant';
  roomId=Math.random().toString(36).slice(2,8).toUpperCase();
  const url=location.origin+location.pathname+'?room='+roomId;
  hide('screenSetup');show('screenWaiting');
  $('waitLink').textContent=url;
  $('copyLinkBtn').onclick=()=>navigator.clipboard.writeText(url).then(()=>notify('링크 복사됐어요 ✦'));
  db.ref('rooms/'+roomId).set({status:'waiting',round:0,shuffleTs:0});
  db.ref('rooms/'+roomId+'/status').on('value',snap=>{
    if(snap.val()==='active'){hide('screenWaiting');enterSession();}
  });
}

/* ENTER SESSION */
function enterSession(){
  if(role==='client') db.ref('rooms/'+roomId+'/status').set('active');
  hide('screenSetup');hide('screenWaiting');show('screenApp');
  $('hdrDot').classList.remove('off');
  $('hdrStatusText').textContent=(role==='consultant'?'상담사':'내담자')+' · Room '+roomId;
  if(role==='consultant'){
    show('btnAddQ');
    $('btnAddQ').onclick=requestAddQ;
  }
  $('sendBtn').onclick=sendMsg;
  $('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
  $('btnSave').onclick=saveSession;
  $('btnEnd').onclick=endSession;
  listenRoom();
  listenChat();
}

/* ROOM LISTENER */
function listenRoom(){
  db.ref('rooms/'+roomId).on('value',snap=>{
    const data=snap.val()||{};
    currentRound=data.round||0;
    // Reset drawnIds when round changes
    renderMain(data);
    updatePinnedQ(data);
    // Mirror shuffle for consultant
    if(role==='consultant'){
      const ts=data.shuffleTs||0;
      if(ts>prevShuffleTs){
        prevShuffleTs=ts;
        const stack=$('deckStack');
        if(stack) playShuffleAnim(stack);
      }
    }
  });
}

/* RENDER MAIN */
function renderMain(data){
  const area=$('mainArea');
  area.innerHTML='';
  const rounds=data.rounds||{};
  const roundNums=Object.keys(rounds).map(Number).sort((a,b)=>a-b);

  if(role==='consultant'){
    renderConsultant(area,data,rounds,roundNums);
  } else {
    renderClient(area,data,rounds,roundNums);
  }
}

/* CONSULTANT */
function renderConsultant(area,data,rounds,roundNums){
  // Past rounds
  roundNums.filter(n=>n<currentRound).forEach(n=>{
    area.appendChild(makePastRound(n,rounds[n]||{}));
  });
  const cur=rounds[currentRound]||{};
  const q=cur.question||'';
  if(!q){
    const w=document.createElement('div');w.className='waiting-notice';
    w.innerHTML='<div class="waiting-icon">✦</div><div class="waiting-text">내담자가 질문을 입력하고 있습니다...<br><span style="font-size:11px;opacity:.5">질문이 확정되면 카드 덱이 나타납니다</span></div>';
    area.appendChild(w);
    return;
  }
  // Label
  const lbl=document.createElement('div');
  lbl.innerHTML=`<div class="section-label">ROUND ${currentRound+1} · 실시간 감상</div>`;
  area.appendChild(lbl);
  // Mirror deck
  area.appendChild(buildDeck(false));
  // Cards
  area.appendChild(buildCardsArea(cur.cards||{}));
}

/* CLIENT */
function renderClient(area,data,rounds,roundNums){
  const cur=rounds[currentRound]||{};
  const q=cur.question||'';
  // Past rounds
  roundNums.filter(n=>n<currentRound).forEach(n=>{
    area.appendChild(makePastRound(n,rounds[n]||{}));
  });
  if(!q){
    area.appendChild(buildQInput(currentRound>0));
    return;
  }
  const lbl=document.createElement('div');
  lbl.innerHTML=`<div class="section-label">ROUND ${currentRound+1}</div>`;
  area.appendChild(lbl);
  area.appendChild(buildDeck(true));
  area.appendChild(buildCardsArea(cur.cards||{}));
}

/* PAST ROUND */
function makePastRound(n,rdata){
  const b=document.createElement('div');b.className='round-block';
  b.innerHTML=`<div class="round-block-title">ROUND ${n+1} · 완료</div>
    <div class="round-block-q">${esc(rdata.question||'(질문 없음)')}</div>`;
  const cw=document.createElement('div');cw.className='drawn-cards';cw.style.marginTop='4px';
  const cards=rdata.cards||{};
  const cks=Object.keys(cards).sort((a,b_)=>cards[a].ts-cards[b_].ts);
  if(!cks.length){cw.innerHTML='<div class="drawn-empty" style="height:60px">카드 없음</div>';}
  else cks.forEach(k=>{const c=DECK.find(d=>d.id===cards[k].id);if(c)cw.appendChild(makeCardEl(c,cards[k].reversed,true));});
  b.appendChild(cw);return b;
}

/* QUESTION INPUT */
function buildQInput(isAdd){
  const sec=document.createElement('div');sec.className='q-section';
  sec.innerHTML=`
    <div class="q-title">${isAdd?`✦ 추가 질문 — Round ${currentRound+1}`:'✦ 오늘의 질문'}</div>
    <div class="q-desc">${isAdd?'상담사가 추가 질문을 요청했어요.<br>새 질문을 입력하고 카드를 뽑아주세요.':'마음속에 담긴 질문을 적어주세요.<br>질문 확정 후 셔플하고 카드를 뽑아주세요.'}</div>
    <textarea class="q-textarea" id="qTA" placeholder="질문을 입력하세요..."></textarea>
    <button class="btn btn-primary q-btn" id="qBtn">질문 확정 →</button>`;
  setTimeout(()=>{
    const btn=$('qBtn'),ta=$('qTA');
    if(btn&&ta) btn.onclick=()=>{
      const q=ta.value.trim();
      if(!q){notify('질문을 입력해주세요');return;}
      db.ref('rooms/'+roomId+'/rounds/'+currentRound).set({question:q,ts:Date.now()});
      sendSysMsg(`✦ [Round ${currentRound+1}] 질문: ${q}`);
      localDeck=rnd([...DECK]);drawnIds.clear();
    };
  },50);
  return sec;
}

/* DECK UI */
function buildDeck(interactive){
  const sec=document.createElement('div');sec.className='deck-section';
  const cls=interactive?'deck-stack interactive':'deck-stack';
  sec.innerHTML=`
    <div class="deck-label">${interactive?'집중하며 셔플 후 카드를 뽑으세요':'내담자 덱 · 실시간'}</div>
    <div class="${cls}" id="deckStack">
      <div class="deck-shadow"></div>
      <div class="deck-shadow"></div>
      <div class="deck-top"><div class="card-back-face"><div class="card-back-star">✦</div></div></div>
    </div>
    <div class="deck-btns">
      ${interactive?'<button class="shuffle-btn" id="shuffleBtn">◈ 셔플</button><button class="btn" id="drawBtn" style="font-size:12px;letter-spacing:2px">카드 뽑기</button>':''}
    </div>`;
  if(interactive) setTimeout(()=>{
    const sb=$('shuffleBtn'),db2=$('drawBtn');
    if(sb)sb.onclick=doShuffle;
    if(db2)db2.onclick=doDrawCard;
  },50);
  return sec;
}

/* CARDS AREA */
function buildCardsArea(cards){
  const area=document.createElement('div');area.className='drawn-cards';area.id='drawnArea';
  const cks=Object.keys(cards).sort((a,b)=>cards[a].ts-cards[b].ts);
  if(!cks.length){
    area.innerHTML='<div class="drawn-empty">카드를 뽑으면 여기에 나타납니다</div>';
  } else {
    cks.forEach(k=>{
      const c=DECK.find(d=>d.id===cards[k].id);
      if(c) area.appendChild(makeCardEl(c,cards[k].reversed,false));
    });
    setTimeout(()=>{
      area.querySelectorAll('.card-inner').forEach((w,i)=>{
        if(!w.dataset.f){w.dataset.f='1';setTimeout(()=>w.classList.add('flipped'),50+i*70);}
      });
    },80);
  }
  return area;
}

/* CARD EL */
function makeCardEl(card,reversed,flipped){
  const wrap=document.createElement('div');wrap.className='drawn-card-wrap';
  const cw=document.createElement('div');cw.className='card-wrap';cw.onclick=()=>revealCard(card,reversed);
  const inner=document.createElement('div');
  inner.className='card-inner'+(reversed?' reversed':'')+(flipped?' flipped':'');
  const back=document.createElement('div');back.className='card-back-card';
  back.innerHTML='<div class="card-back-face"><div class="card-back-star">✦</div></div>';
  const front=document.createElement('div');front.className='card-face';
  front.innerHTML=`<img src="${cimg(card)}" alt="${esc(card.name)}"
    onerror="this.style.display='none';this.nextSibling.style.display='flex'">
    <div class="card-face-fallback" style="display:none">
      <div class="cs">${SICON[card.suit]||'✦'}</div>
      <div class="cn">${esc(card.name)}</div><div class="ck">${esc(card.kr)}</div>
    </div>${reversed?'<div class="card-rev-badge">역</div>':''}`;
  inner.appendChild(back);inner.appendChild(front);cw.appendChild(inner);wrap.appendChild(cw);
  const lbl=document.createElement('div');lbl.className='drawn-card-name';
  lbl.textContent=card.kr+(reversed?' ↓':'');wrap.appendChild(lbl);
  return wrap;
}

function revealCard(card,reversed){
  const ov=document.createElement('div');ov.className='card-reveal-overlay';ov.onclick=()=>ov.remove();
  ov.innerHTML=`<div class="card-reveal-box">
    <div class="card-reveal-img ${reversed?'rev':''}">
      <img src="${cimg(card)}" onerror="this.parentElement.style.background='#14142e';this.style.display='none'">
    </div>
    <div class="card-reveal-name">${esc(card.name)}</div>
    <div class="card-reveal-sub">${esc(card.kr)}${reversed?' · 역방향':''}</div>
    <div class="card-reveal-close">[ 닫기 ]</div>
  </div>`;
  document.body.appendChild(ov);
}

/* SHUFFLE */
function doShuffle(){
  const sb=$('shuffleBtn'),db2=$('drawBtn');
  if(sb)sb.disabled=true;if(db2)db2.disabled=true;
  db.ref('rooms/'+roomId+'/shuffleTs').set(Date.now());
  const stack=$('deckStack');
  playShuffleAnim(stack,()=>{
    localDeck=rnd([...DECK]);drawnIds.clear();
    db.ref('rooms/'+roomId+'/rounds/'+currentRound+'/cards').remove();
    if(sb)sb.disabled=false;if(db2)db2.disabled=false;
    notify('셔플 완료 ✦ 카드를 뽑아보세요');
  });
}

function playShuffleAnim(stack,cb){
  if(!stack)return;
  const rect=stack.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const dirs=[[-100,-50,-25],[90,-70,20],[-70,60,-30],[80,45,18],[-40,-80,-15],[60,-55,28],[10,90,-22]];
  const fc=dirs.map(([dx,dy,rot])=>{
    const el=document.createElement('div');el.className='shuffle-card';
    el.innerHTML='<div class="card-back-face" style="border-radius:7px"><div class="card-back-star">✦</div></div>';
    el.style.cssText=`left:${cx-44}px;top:${cy-75}px;transition:transform .45s cubic-bezier(.4,0,.2,1),opacity .45s`;
    document.body.appendChild(el);return{el,dx,dy,rot};
  });
  requestAnimationFrame(()=>{fc.forEach(({el,dx,dy,rot})=>{el.style.transform=`translate(${dx}px,${dy}px) rotate(${rot}deg)`;el.style.opacity='.85';});});
  setTimeout(()=>{
    fc.forEach(({el})=>{el.style.transform='translate(0,0)';el.style.opacity='0';});
    setTimeout(()=>{fc.forEach(({el})=>el.remove());if(cb)cb();},500);
  },550);
}

/* DRAW */
function doDrawCard(){
  const avail=localDeck.filter(c=>!drawnIds.has(c.id));
  if(!avail.length){notify('모든 카드를 뽑았어요. 셔플해주세요.');return;}
  const card=avail[0];const rev=Math.random()<0.33;
  drawnIds.add(card.id);
  db.ref('rooms/'+roomId+'/rounds/'+currentRound+'/cards/c'+Date.now()).set({id:card.id,reversed:rev,ts:Date.now()});
  sendSysMsg('✦ '+card.kr+(rev?' (역방향)':'')+' 카드가 뽑혔습니다');
}

/* ADDITIONAL QUESTION */
function requestAddQ(){
  if(!confirm('내담자에게 추가 질문을 요청할까요?'))return;
  const next=currentRound+1;
  db.ref('rooms/'+roomId+'/round').set(next);
  db.ref('rooms/'+roomId+'/shuffleTs').set(0);
  prevShuffleTs=0;
  localDeck=rnd([...DECK]);drawnIds.clear();
  sendSysMsg(`✦ 상담사가 추가 질문을 요청했습니다 — Round ${next+1} 시작`);
  notify('추가 질문 요청을 보냈어요');
}

/* PINNED Q */
function updatePinnedQ(data){
  const cur=(data.rounds||{})[currentRound]||{};
  const q=cur.question||'';
  const pq=$('pinnedQ');
  if(q){
    pq.classList.remove('hidden');
    $('pinnedQText').textContent=q;
    $('pinnedQRound').textContent='Round '+(currentRound+1);
  } else {
    pq.classList.add('hidden');
  }
}

/* CHAT */
function listenChat(){
  db.ref('rooms/'+roomId+'/chat').on('value',snap=>{
    const msgs=Object.values(snap.val()||{}).sort((a,b)=>a.ts-b.ts);
    const box=$('chatMsgs');box.innerHTML='';
    msgs.forEach(m=>{
      const el=document.createElement('div');
      if(m.sys){el.className='msg msg-sys';el.textContent=m.text;}
      else{
        el.className='msg msg-'+m.role;
        const nm=document.createElement('div');nm.className='msg-name';
        nm.textContent=m.role==='consultant'?'✦ 상담사':'⟡ 내담자';
        el.appendChild(nm);
        const tx=document.createElement('div');tx.textContent=m.text;el.appendChild(tx);
      }
      box.appendChild(el);
    });
    box.scrollTop=box.scrollHeight;
  });
}
function sendMsg(){
  const inp=$('chatInput'),txt=inp.value.trim();if(!txt)return;
  db.ref('rooms/'+roomId+'/chat').push({role,text:txt,ts:Date.now()});
  inp.value='';
}
function sendSysMsg(t){db.ref('rooms/'+roomId+'/chat').push({sys:true,text:t,ts:Date.now()});}

/* SAVE / END */
function saveSession(){
  db.ref('rooms/'+roomId).once('value').then(snap=>{
    const d=snap.val()||{};
    const rounds=d.rounds||{};
    const msgs=Object.values(d.chat||{}).sort((a,b)=>a.ts-b.ts);
    let txt=`✦ MYSTIC TAROT 상담 기록\n날짜: ${new Date().toLocaleString('ko-KR')}\nRoom: ${roomId}\n\n`;
    Object.keys(rounds).sort().forEach(ri=>{
      const r=rounds[ri];
      txt+=`── Round ${Number(ri)+1} ──\n질문: ${r.question||''}\n`;
      Object.values(r.cards||{}).sort((a,b)=>a.ts-b.ts).forEach((c,i)=>{
        const card=DECK.find(d=>d.id===c.id);
        if(card)txt+=`  ${i+1}. ${card.name} (${card.kr})${c.reversed?' [역방향]':''}\n`;
      });
      txt+='\n';
    });
    txt+=`── 채팅 내역 ──\n`;
    msgs.forEach(m=>{
      if(m.sys)txt+=`[알림] ${m.text}\n`;
      else txt+=`[${m.role==='consultant'?'상담사':'내담자'}] ${m.text}\n`;
    });
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
    a.download=`tarot-${roomId}-${Date.now()}.txt`;a.click();
    notify('상담 내역이 저장됐습니다 ✦');
  });
}
function endSession(){
  if(!confirm('상담을 종료할까요?'))return;
  db.ref('rooms/'+roomId+'/status').set('ended');
  saveSession();
  notify('상담이 종료됐습니다.');
  setTimeout(()=>location.href=location.pathname,2500);
}

window.addEventListener('DOMContentLoaded',init);
</script>
